<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUIS SENI TARI KELOMPOK 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --text-muted: #cccccc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --glass-inset: inset 0 1px 1px rgba(255,255,255,0.1), inset 0 -2px 5px rgba(0,0,0,0.5);
            --blob-1: #800000;
            --blob-2: #4a0000;
            --blob-3: #660000;
            --accent-color: #ff1a1a;
            --correct-color: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        .liquid-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.5; animation: float 15s infinite alternate ease-in-out; }
        .blob:nth-child(1) { width: 500px; height: 500px; background: var(--blob-1); top: -10%; left: -10%; }
        .blob:nth-child(2) { width: 400px; height: 400px; background: var(--blob-2); bottom: -5%; right: -5%; animation-delay: -4s; }
        .blob:nth-child(3) { width: 450px; height: 450px; background: var(--blob-3); top: 30%; left: 40%; animation-delay: -8s; opacity: 0.3; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.2); } }

        .glass { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 28px; box-shadow: 0 15px 35px var(--glass-shadow), var(--glass-inset); padding: 20px; margin-bottom: 15px; width: 100%; }
        .container { width: 92%; max-width: 500px; margin-top: 20px; display: none; z-index: 10; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI START & CENTERED */
        #start-ui { position: fixed; inset: 0; z-index: 2000; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .start-content { width: 85%; max-width: 400px; text-align: center; }
        .start-content h1 { font-size: 2.2rem; font-weight: 800; color: var(--accent-color); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        .mode-selection { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .input-name { width: 100%; padding: 18px; border-radius: 18px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: #fff; margin: 20px 0; outline: none; font-size: 1.1rem; text-align: center; box-shadow: var(--glass-inset); }
        
        #warning-ui { position: fixed; inset: 0; z-index: 3000; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); }
        .warning-box { width: 85%; max-width: 380px; text-align: center; border: 1.5px solid var(--accent-color) !important; }

        .btn-xos { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; cursor: pointer; transition: 0.3s; box-shadow: var(--glass-inset); display: flex; align-items: center; justify-content: center; }
        .btn-xos:active { transform: scale(0.96); }
        .btn-core { flex: 1; padding: 16px; border-radius: 18px; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .btn-next { background: var(--accent-color); color: #fff; border-color: transparent; box-shadow: 0 8px 20px rgba(255,26,26,0.3), var(--glass-inset); }

        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .timer-pill { background: var(--glass-bg); padding: 8px 22px; border-radius: 50px; border: 1px solid var(--glass-border); box-shadow: var(--glass-inset); font-weight: 800; font-size: 1.3rem; color: #fff; }
        
        #visual-area-frame { width: 100%; min-height: 150px; background: rgba(0,0,0,0.3); border-radius: 22px; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 18px; }
        #visual-area-frame img { width: 100%; max-height: 230px; object-fit: contain; }
        
        .question-text { font-size: 0.95rem; line-height: 1.7; text-align: justify; color: var(--text-muted); margin-bottom: 22px; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { padding: 18px; border-radius: 18px; text-align: left; font-size: 0.95rem; width: 100%; justify-content: flex-start; }
        .opt-btn.correct { background: var(--correct-color) !important; color: #000 !important; font-weight: 800; border-color: var(--correct-color); }
        .opt-btn.wrong { background: var(--accent-color) !important; border-color: var(--accent-color); animation: shake 0.4s ease; }
        
        .nav-frame { display: flex; justify-content: space-between; gap: 15px; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .num-tile { aspect-ratio: 1/1; border-radius: 15px; font-size: 0.9rem; font-weight: 800; color: rgba(255,255,255,0.2); cursor: pointer; }
        .num-tile.active { border-color: var(--accent-color); color: var(--accent-color); background: rgba(255,26,26,0.1); box-shadow: 0 0 15px rgba(255, 26, 26, 0.4), var(--glass-inset); }
        .num-tile.done { color: #fff; border-color: rgba(255,255,255,0.3); }

        /* ADMIN PANEL */
        #admin-panel { position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .admin-box { width: 90%; max-width: 400px; text-align: center; }
        .btn-reset { color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: 800; margin-top: 12px; cursor: pointer; }
        
        .pita { position: fixed; width: 8px; height: 12px; top: -20px; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(720deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <!-- START UI -->
    <div id="start-ui">
        <div class="glass start-content">
            <h1>SENI TARI</h1>
            
            <div id="mode-screen">
                <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px;">PILIH MODE GAME</p>
                <div class="mode-selection">
                    <button class="btn-xos btn-core btn-next" onclick="setMode('PG')">1. KUIS PILIHAN GANDA</button>
                    <button class="btn-xos btn-core btn-next" style="background:#444" onclick="setMode('TF')">2. KUIS TRUE OR FALSE</button>
                    <button class="btn-xos" style="margin-top:20px; border:none; background:transparent; font-size:0.7rem; opacity:0.4;" onclick="openAdmin()">Akses Admin Panel</button>
                </div>
            </div>

            <div id="name-screen" style="display:none">
                <p id="selected-mode-text" style="color:var(--accent-color); font-weight:800; font-size:0.8rem"></p>
                <input type="text" id="player-name" class="input-name" placeholder="Ketik nama lengkap..." spellcheck="false">
                <button class="btn-xos btn-core btn-next" style="width: 100%;" onclick="requestStart()">MULAI KUIS</button>
                <p onclick="backToMode()" style="font-size:0.7rem; margin-top:15px; opacity:0.5; cursor:pointer">← Kembali Pilih Mode</p>
            </div>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel">
        <div class="glass admin-box">
            <h2 style="color: var(--accent-color); margin-bottom: 20px;">ADMIN PANEL</h2>
            <button class="btn-reset" style="background:#ff3333" onclick="resetLeaderboard('PG')">RESET KUIS 1 (Sheet1)</button>
            <button class="btn-reset" style="background:#ff8800" onclick="resetLeaderboard('TF')">RESET KUIS 2 (Sheet2)</button>
            <button class="btn-xos" style="margin-top:25px; width:100%; padding:15px; border-radius:15px" onclick="closeAdmin()">TUTUP</button>
        </div>
    </div>

    <!-- WARNING UI -->
    <div id="warning-ui">
        <div class="glass warning-box">
            <h2 style="color: var(--accent-color); margin-bottom: 15px;">SIAP? ⚠️</h2>
            <p id="warning-text" style="font-size: 0.9rem; opacity: 0.8; line-height: 1.7; margin-bottom: 25px;"></p>
            <button class="btn-xos btn-core btn-next" style="width: 100%;" onclick="confirmStart()">SAYA SIAP!</button>
        </div>
    </div>

    <div class="container" id="main-container">
        <!-- HEADER -->
        <div class="quiz-header">
            <div>
                <div class="info-label" id="label-no" style="font-size:0.7rem; color:var(--accent-color); font-weight:800;">SOAL 1</div>
                <div class="info-label" id="user-display" style="color:#fff; opacity:0.5; font-size:0.6rem;">USER: -</div>
            </div>
            <div class="timer-pill" id="timer-val">20:00</div>
        </div>

        <!-- SCREEN KUIS -->
        <div id="quiz-screen">
            <div class="glass">
                <div id="visual-area-frame"></div>
                <div class="question-text" id="q-text">Memuat...</div>
                <div class="options-grid" id="options-box"></div>
            </div>
            <div class="glass nav-frame">
                <button class="btn-xos btn-core btn-back" id="btn-back" onclick="changeIdx(-1)">KEMBALI</button>
                <button class="btn-xos btn-core btn-next" id="btn-next" onclick="changeIdx(1)">LANJUT</button>
            </div>
            <div class="glass">
                <div class="num-grid" id="num-grid"></div>
            </div>
        </div>

        <!-- SCREEN HASIL -->
        <div id="result-ui" style="display: none;">
            <div class="glass" style="text-align: center;">
                <h2 style="color: var(--accent-color); letter-spacing: 1px;">HASIL KUIS</h2>
                <div style="display:flex; justify-content:center; align-items:baseline; gap:10px; margin:15px 0;">
                    <span style="font-size:4.5rem; font-weight:800; color:var(--correct-color);" id="res-score">0</span>
                    <span style="font-size:1.5rem; opacity:0.4;" id="res-max">/ 20</span>
                    <span style="font-size:1.8rem; font-weight:600;" id="res-percent">(0%)</span>
                </div>
                <div id="res-badge" style="display:inline-block; padding:8px 25px; border-radius:50px; background:rgba(0,255,136,0.1); border:1px solid var(--correct-color); color:var(--correct-color); font-weight:800; font-size:0.8rem; margin-bottom:20px;">GELAR: -</div>
                
                <h3 id="leaderboard-title" style="text-align:left; font-size:0.8rem; color:var(--accent-color); border-left:3px solid var(--accent-color); padding-left:10px; margin-bottom:12px; text-transform:uppercase;">TOP 10 RANKING</h3>
                <div style="border-radius:20px; overflow:hidden; border:1px solid var(--glass-border); background:rgba(0,0,0,0.2);">
                    <table style="width:100%; border-collapse:collapse; font-size:0.8rem;">
                        <thead style="background:rgba(255,26,26,0.15); color:var(--accent-color);"><tr><th style="padding:12px; text-align:left;">No</th><th style="padding:12px; text-align:left;">Nama</th><th style="padding:12px; text-align:left;">Skor</th></tr></thead>
                        <tbody id="rank-body"></tbody>
                    </table>
                </div>
                <button class="btn-xos btn-core btn-next" style="width: 100%; margin-top: 25px;" onclick="location.reload()">ULANGI KUIS</button>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_URL = "https://script.google.com/macros/s/AKfycbxgFnXIp1Z6yi3YO4ovkFbZ3gvvva4gBY8k4-H0Y1341uBzNlntxHiSOkUPdgSgHTVJlg/exec";

        const qPG = [
            { q: "Seorang penari mengayunkan tangan ke kanan dan kiri tanpa maksud tertentu, hanya untuk memperindah gerakan.\n\nGerakan tersebut termasuk...", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331263/FOTO_SOAL_NOMER_1_xozxb5.png", opt: ["A. Gerak maknawi", "B. Gerak tradisional", "C. Gerak murni", "D. Gerak modern"], ans: 2 },
            { q: "Seorang penari menirukan gerakan menanam padi di sawah.\n\nGerakan tersebut termasuk...", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331292/FOTO_SOAL_NOMER_2_fklqft.png", opt: ["A. Gerak murni", "B. Gerak maknawi", "C. Gerak bebas", "D. Gerak irama"], ans: 1 },
            { q: "Jika penari bergerak cepat mengikuti musik yang cepat, unsur yang paling berpengaruh adalah...", img: null, opt: ["A. Ruang", "B. Tenaga", "C. Waktu", "D. Rias"], ans: 2 },
            { q: "Perhatikan ilustrasi: Penari bergerak dari depan ke belakang panggung.", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331275/FOTO_SOAL_NOMER_4_iljpaf.png", opt: ["A. Tenaga", "B. Ruang", "C. Waktu", "D. Rasa"], ans: 1 },
            { q: "Seorang penari menampilkan gerakan lembut dan pelan. Hal ini menunjukkan unsur…", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331275/FOTO_SOAL_NOMER_4_iljpaf.png", opt: ["A. Waktu", "B. Tenaga", "C. Ruang", "D. Busana"], ans: 1 },
            { q: "Penari mampu menyesuaikan gerakan dengan irama musik dengan tepat. Kemampuan ini disebut...", img: null, opt: ["A. Wiraga", "B. Wirama", "C. Wirasa", "D. Wirupa"], ans: 1 },
            { q: "Seorang penari menunjukkan ekspresi sedih saat menari. Hal ini termasuk unsur...", img: null, opt: ["A. Wiraga", "B. Wirama", "C. Wirasa", "D. Properti"], ans: 2 },
            { q: "Jika seorang penari menggunakan kipas saat menari, kipas tersebut disebut...", img: null, opt: ["A. Tata rias", "B. Tata busana", "C. Properti tari", "D. Iringan"], ans: 2 },
            { q: "Tari yang digunakan dalam upacara adat biasanya bersifat...", img: null, opt: ["A. Hiburan", "B. Modern", "C. Sakral", "D. Bebas"], ans: 2 },
            { q: "Tari yang ditampilkan untuk menghibur penonton disebut...", img: null, opt: ["A. Tari upacara", "B. Tari hiburan", "C. Tari sakral", "D. Tari klasik"], ans: 1 },
            { q: "Sebuah tarian dibawakan oleh 5 orang penari. Jenis tari tersebut adalah...", img: null, opt: ["A. Tari tunggal", "B. Tari berpasangan", "C. Tari kelompok", "D. Tari modern"], ans: 2 },
            { q: "Perhatikan ilustrasi: Dua penari bersama.", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331287/FOTO_SOAL_NOMER_12_jn67is.png", opt: ["A. Tunggal", "B. Kelompok", "C. Berpasangan", "D. Modern"], ans: 2 },
            { q: "Tari yang diwariskan secara turun-temurun disebut...", img: null, opt: ["A. Tari modern", "B. Tari tradisional", "C. Tari kreasi", "D. Tari bebas"], ans: 1 },
            { q: "Tari yang merupakan pengembangan dari tari tradisional disebut...", img: null, opt: ["A. Tari klasik", "B. Tari modern", "C. Tari kreasi baru", "D. Tari rakyat"], ans: 2 },
            { q: "Seorang penari menari tanpa mengikuti aturan baku dan bebas berekspresi.", img: null, opt: ["A. Tradisional", "B. Kreasi baru", "C. Modern/kontemporer", "D. Upacara"], ans: 2 },
            { q: "Mengapa unsur wiraga penting dalam tari?", img: null, opt: ["A. Agar musik jelas", "B. Agar gerak indah", "C. Penonton ramai", "D. Kostum menarik"], ans: 1 },
            { q: "Fungsi tata rias tebal agar karakter terlihat jelas di panggung adalah...", img: null, opt: ["A. Memperindah", "B. Karakter jelas", "C. Tentukan tempo", "D. Mengatur ruang"], ans: 1 },
            { q: "Jika gerakan dilakukan dengan kuat dan tegas, maka unsur yang dominan adalah...", img: null, opt: ["A. Ruang", "B. Waktu", "C. Tenaga", "D. Rasa"], ans: 2 },
            { q: "Penari bergerak di tempat tanpa berpindah (diam di satu titik).", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331286/FOTO_SOAL_NOMER_19_eepg5t.png", opt: ["A. Ruang panggung", "B. Ruang umum", "C. Ruang pribadi", "D. Ruang bebas"], ans: 2 },
            { q: "Apa fungsi utama musik dalam tari?", img: null, opt: ["A. Agar tak lupa", "B. Menarik penonton", "C. Atur tempo & suasana", "D. Ganti kostum"], ans: 2 }
        ];

        const qTF = [
            { q: "Gerak dalam seni tari hanya berupa aktivitas fisik tanpa makna.", opt: ["BENAR", "SALAH"], ans: 1 },
            { q: "Gerak murni dalam tari bertujuan menyampaikan pesan atau cerita tertentu.", opt: ["BENAR", "SALAH"], ans: 1 },
            { q: "Gerak maknawi berasal dari aktivitas kehidupan sehari-hari yang distilisasi.", opt: ["BENAR", "SALAH"], ans: 0 },
            { q: "Unsur dasar gerak tari terdiri dari ruang, waktu, dan tenaga.", opt: ["BENAR", "SALAH"], ans: 0 },
            { q: "Wiraga berkaitan dengan penghayatan dan ekspresi perasaan penari.", opt: ["BENAR", "SALAH"], ans: 1 },
            { q: "Wirama berhubungan dengan keselarasan gerak tari dengan iringan musik.", opt: ["BENAR", "SALAH"], ans: 0 },
            { q: "Tata rias hanya berfungsi untuk mempercantik penari tanpa makna lain.", opt: ["BENAR", "SALAH"], ans: 1 },
            { q: "Tari upacara bersifat sakral dan tidak boleh diubah sembarangan.", opt: ["BENAR", "SALAH"], ans: 0 },
            { q: "Tari tunggal melibatkan lebih dari dua penari dalam satu pertunjukan.", opt: ["BENAR", "SALAH"], ans: 1 },
            { q: "Tari modern cenderung lebih bebas dalam gerak dan tema.", opt: ["BENAR", "SALAH"], ans: 0 }
        ];

        let questions = [], idx = 0, pName = "", answers = [], timer = 20 * 60, clock, curMode = "";

        function setMode(m) {
            curMode = m;
            questions = (m === 'PG') ? qPG : qTF;
            answers = new Array(questions.length).fill(null);
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('name-screen').style.display = 'block';
            document.getElementById('selected-mode-text').innerText = "MODE: " + (m === 'PG' ? 'PILIHAN GANDA' : 'TRUE/FALSE');
            document.getElementById('visual-area-frame').style.display = (m === 'TF') ? 'none' : 'flex';
        }

        function backToMode() { document.getElementById('mode-screen').style.display = 'block'; document.getElementById('name-screen').style.display = 'none'; }

        function requestStart() {
            pName = document.getElementById('player-name').value.trim();
            if(!pName) { vibrate(300); return alert("Isi nama dulu!"); }
            document.getElementById('start-ui').style.display = 'none';
            document.getElementById('warning-ui').style.display = 'flex';
            document.getElementById('warning-text').innerText = `Waktu 20 Menit dimulai untuk ${questions.length} soal kuis ${curMode === 'PG' ? 'Pilihan Ganda' : 'Benar/Salah'}.`;
        }

        function confirmStart() {
            document.getElementById('warning-ui').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            document.getElementById('user-display').innerText = "USER: " + pName.toUpperCase();
            startTimer(); render();
        }

        function startTimer() {
            clock = setInterval(() => {
                timer--;
                let m = Math.floor(timer/60), s = timer%60;
                document.getElementById('timer-val').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(timer <= 60) document.getElementById('timer-val').style.color = 'var(--accent-color)';
                if(timer <= 0) finish();
            }, 1000);
        }

        function render() {
            renderGrid();
            const q = questions[idx];
            document.getElementById('label-no').innerText = `SOAL ${idx+1} / ${questions.length}`;
            document.getElementById('q-text').innerText = q.q;
            if(curMode === 'PG') {
                document.getElementById('visual-area-frame').innerHTML = q.img ? `<img src="${q.img}">` : `<span style="font-size:3rem; opacity:0.1;">🎭</span>`;
            }
            const box = document.getElementById('options-box'); box.innerHTML = '';
            q.opt.forEach((txt, i) => {
                const b = document.createElement('div'); b.className = 'opt-btn btn-xos';
                if(answers[idx] !== null) {
                    if(i === q.ans) b.classList.add('correct');
                    if(answers[idx] === i && i !== q.ans) b.classList.add('wrong');
                }
                b.innerText = txt; b.onclick = () => select(i); box.appendChild(b);
            });
            document.getElementById('btn-back').disabled = idx === 0;
            document.getElementById('btn-next').innerText = idx === questions.length-1 ? "SELESAI" : "LANJUT";
        }

        function renderGrid() {
            const grid = document.getElementById('num-grid'); grid.innerHTML = '';
            questions.forEach((_, i) => {
                const d = document.createElement('div');
                d.className = `num-tile btn-xos ${i === idx ? 'active' : ''} ${answers[i] !== null ? 'done' : ''}`;
                d.innerText = i + 1; d.onclick = () => { idx = i; render(); };
                grid.appendChild(d);
            });
        }

        function select(i) {
            if(answers[idx] !== null) return;
            answers[idx] = i;
            if(i === questions[idx].ans) { vibrate([50, 30, 50]); createPita(); }
            else vibrate(250);
            render();
        }

        function vibrate(p) { if(navigator.vibrate) navigator.vibrate(p); }

        function createPita() {
            for(let i=0; i<30; i++){
                const p = document.createElement('div'); p.className = 'pita';
                p.style.left = Math.random()*100+'vw'; p.style.background = `hsl(${Math.random()*360},100%,50%)`;
                p.style.animationDuration = (Math.random()*2+1)+'s'; document.body.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }
        }

        function changeIdx(d) {
            if(d === 1 && idx === questions.length-1) return finish();
            idx += d; render();
        }

        function finish() {
            clearInterval(clock);
            let score = 0; answers.forEach((a, i) => { if(a === questions[i].ans) score++; });
            const pct = (score/questions.length)*100;

            fetch(SPREADSHEET_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action: "add", mode: curMode, name: pName, score: score, percent: pct + "%" })
            });

            let storageKey = 'danceRank_' + curMode;
            let ranking = JSON.parse(localStorage.getItem(storageKey)) || [];
            ranking.push({ name: pName, point: score, percent: pct });
            ranking.sort((a,b) => b.point - a.point);
            localStorage.setItem(storageKey, JSON.stringify(ranking.slice(0,10)));

            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            document.getElementById('res-score').innerText = score;
            document.getElementById('res-max').innerText = "/ " + questions.length;
            document.getElementById('res-percent').innerText = `(${pct}%)`;

            const body = document.getElementById('rank-body');
            body.innerHTML = ranking.map((r, i) => `<tr><td style="padding:12px;">${i+1}</td><td style="padding:12px;">${r.name.toUpperCase()}</td><td style="padding:12px; font-weight:bold; color:var(--correct-color);">${r.point} (${r.percent}%)</td></tr>`).join('');
            
            const badge = document.getElementById('res-badge');
            if(pct === 100) badge.innerText = "GELAR: MAESTRO SENI TARI 👑";
            else if(pct >= 80) badge.innerText = "GELAR: PAKAR TARI 🌟";
            else badge.innerText = "GELAR: PENARI MUDA ✨";
        }

        function openAdmin() { if(prompt("Password Admin:") === "kelompok2") document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function resetLeaderboard(m) {
            if(confirm(`Hapus data ${m === 'PG' ? 'Sheet1' : 'Sheet2'}?`)) {
                localStorage.removeItem('danceRank_' + m);
                fetch(SPREADSHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "reset", mode: m }) });
                alert("Berhasil Reset!"); location.reload();
            }
        }
    </script>
</body>
</html>
