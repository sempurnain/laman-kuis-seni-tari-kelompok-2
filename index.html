<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUIS SENI TARI KELOMPOK 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #ff1a1a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --bg-dark: #050505;
            --correct: #00ff88;
            --wrong: #ff3333;
        }

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: #fff; min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

        /* LIQUID BACKGROUND (XOS STYLE) */
        .liquid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; background: #000; }
        .blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.4; animation: move 20s infinite alternate ease-in-out; }
        .blob-1 { width: 500px; height: 500px; background: #800000; top: -10%; left: -20%; }
        .blob-2 { width: 400px; height: 400px; background: #4a0000; bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes move { from { transform: translate(0, 0) scale(1); } to { transform: translate(50px, 100px) scale(1.2); } }

        /* GLASS CARD GLOBAL */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            padding: 20px;
        }

        /* 1. START SCREEN (CENTERED) */
        #start-ui {
            position: fixed; inset: 0; z-index: 3000;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8);
        }
        .start-box { width: 85%; max-width: 400px; text-align: center; padding: 40px 25px; }
        .welcome-title { font-size: 2rem; font-weight: 800; color: var(--accent-color); margin-bottom: 10px; letter-spacing: 2px; }
        .input-name {
            width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: #fff; margin: 25px 0; outline: none; 
            font-size: 1rem; text-align: center;
        }

        /* 2. WARNING MODAL */
        #warning-ui {
            position: fixed; inset: 0; z-index: 4000;
            display: none; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
        }
        .warning-box { width: 85%; max-width: 380px; text-align: center; border: 2px solid var(--accent-color); }

        /* 3. QUIZ INTERFACE */
        .container { width: 92%; max-width: 500px; margin: 20px auto; flex: 1; display: none; }
        
        /* HEADER TIMER */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .timer-pill {
            background: rgba(255, 255, 255, 0.1); padding: 5px 20px; border-radius: 50px;
            font-weight: 800; font-size: 1.2rem; color: #fff; border: 1px solid var(--glass-border);
        }
        .info-pill { font-size: 0.7rem; font-weight: 600; opacity: 0.6; text-transform: uppercase; }

        /* SOAL & VISUAL */
        .visual-frame { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 20px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); min-height: 150px; display: flex; align-items: center; justify-content: center; }
        .visual-frame img { width: 100%; max-height: 250px; object-fit: contain; }
        .question-text { font-size: 0.95rem; line-height: 1.6; text-align: justify; margin-bottom: 25px; font-weight: 400; }

        /* OPTIONS */
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 18px; color: #fff; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
        }
        .opt-btn.correct { background: var(--correct) !important; color: #000 !important; font-weight: 700; border-color: var(--correct); }
        .opt-btn.wrong { background: var(--wrong) !important; animation: shake 0.4s ease; border-color: var(--wrong); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        /* NAVIGATION FRAME */
        .nav-frame { display: flex; justify-content: space-between; gap: 15px; }
        .btn-core {
            flex: 1; padding: 15px; border-radius: 20px; border: none; font-weight: 700;
            cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s;
        }
        .btn-back { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-next { background: var(--accent-color); color: #fff; box-shadow: 0 8px 20px rgba(255,26,26,0.3); }

        /* NUMBER GRID FRAME */
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .num-tile {
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            font-size: 0.8rem; font-weight: 600; color: #555; cursor: pointer;
        }
        .num-tile.active { border-color: var(--accent-color); color: var(--accent-color); background: rgba(255,26,26,0.1); }
        .num-tile.done { color: #fff; border-color: rgba(255,255,255,0.4); }

        /* RESULT & LEADERBOARD */
        #result-ui { display: none; text-align: center; }
        .score-box { margin: 20px 0; }
        .score-main { font-size: 4rem; font-weight: 800; color: var(--correct); line-height: 1; }
        .score-sub { font-size: 1.5rem; opacity: 0.6; }
        
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 20px; overflow: hidden; font-size: 0.85rem; }
        .rank-table th { background: rgba(255,255,255,0.05); padding: 12px; color: var(--accent-color); text-align: left; }
        .rank-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }

        /* Confetti */
        .pita { position: fixed; width: 8px; height: 12px; top: -20px; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- START UI -->
    <div id="start-ui">
        <div class="glass start-box">
            <h1 class="welcome-title">SENI TARI</h1>
            <p style="font-size: 0.7rem; letter-spacing: 4px; opacity: 0.5;">KELOMPOK 2</p>
            <input type="text" id="player-name" class="input-name" placeholder="Siapa namamu?" spellcheck="false">
            <button class="btn-core btn-next" style="width: 100%;" onclick="requestStart()">MASUK KE KUIS</button>
        </div>
    </div>

    <!-- WARNING UI -->
    <div id="warning-ui">
        <div class="glass warning-box">
            <h2 style="color: var(--accent-color); margin-bottom: 15px;">PERHATIAN! ⚠️</h2>
            <p style="font-size: 0.9rem; opacity: 0.8; line-height: 1.6; margin-bottom: 25px;">
                Setelah tombol di bawah ditekan, <b>Timer 20 Menit</b> akan segera berjalan. <br><br> Kerjakan dengan jujur!
            </p>
            <button class="btn-core btn-next" style="width: 100%;" onclick="confirmStart()">SAYA SIAP!</button>
        </div>
    </div>

    <div class="container" id="main-container">
        <!-- QUIZ UI -->
        <div id="quiz-ui">
            <div class="quiz-header">
                <div>
                    <div class="info-pill" id="label-no">SOAL 1 / 20</div>
                    <div class="info-pill" id="user-display">USER: -</div>
                </div>
                <div class="timer-pill" id="timer-val">20:00</div>
            </div>

            <div class="glass">
                <div class="visual-frame" id="visual-area"></div>
                <div class="question-text" id="q-text">Memuat pertanyaan...</div>
                <div class="options-grid" id="options-box"></div>
            </div>

            <div class="glass nav-frame">
                <button class="btn-core btn-back" id="btn-back" onclick="changeIdx(-1)">KEMBALI</button>
                <button class="btn-core btn-next" id="btn-next" onclick="changeIdx(1)">LANJUT</button>
            </div>

            <div class="glass">
                <div class="num-grid" id="num-grid"></div>
            </div>
        </div>

        <!-- RESULT UI -->
        <div id="result-ui">
            <div class="glass">
                <h2 style="color: var(--accent-color);">HASIL AKHIR</h2>
                <div class="score-box">
                    <span class="score-main" id="res-point">0</span>
                    <span class="score-sub">/ 20</span>
                    <div id="res-percent" style="font-weight: 700; margin-top: 5px;">(0%)</div>
                </div>
                <div id="res-badge" style="color: var(--correct); font-weight: 800; font-size: 0.9rem;">PENARI MUDA ✨</div>
                
                <h3 style="text-align: left; font-size: 0.8rem; margin-top: 30px; color: var(--accent-color); border-left: 3px solid var(--accent-color); padding-left: 10px;">TOP 10 LEADERBOARD</h3>
                <table class="rank-table">
                    <thead><tr><th>No</th><th>Nama</th><th>Skor</th></tr></thead>
                    <tbody id="rank-body"></tbody>
                </table>
                
                <button class="btn-core btn-next" style="width: 100%; margin-top: 30px;" onclick="location.reload()">ULANGI KUIS</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Seorang penari mengayunkan tangan ke kanan dan kiri tanpa maksud tertentu, hanya untuk memperindah gerakan.\n\nGerakan tersebut termasuk...", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331263/FOTO_SOAL_NOMER_1_xozxb5.png", opt: ["A. Gerak maknawi", "B. Gerak tradisional", "C. Gerak murni", "D. Gerak modern"], ans: 2 },
            { q: "Seorang penari menirukan gerakan menanam padi di sawah.\n\nGerakan tersebut termasuk...", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331292/FOTO_SOAL_NOMER_2_fklqft.png", opt: ["A. Gerak murni", "B. Gerak maknawi", "C. Gerak bebas", "D. Gerak irama"], ans: 1 },
            { q: "Jika penari bergerak cepat mengikuti musik yang cepat, unsur yang paling berpengaruh adalah...", img: null, opt: ["A. Ruang", "B. Tenaga", "C. Waktu", "D. Rias"], ans: 2 },
            { q: "Perhatikan ilustrasi: Penari bergerak dari depan ke belakang panggung.\n\nUnsur gerak yang ditunjukkan adalah...", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331275/FOTO_SOAL_NOMER_4_iljpaf.png", opt: ["A. Tenaga", "B. Ruang", "C. Waktu", "D. Rasa"], ans: 1 },
            { q: "Seorang penari menampilkan gerakan lembut dan pelan. Hal ini menunjukkan unsur…", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331275/FOTO_SOAL_NOMER_4_iljpaf.png", opt: ["A. Waktu", "B. Tenaga", "C. Ruang", "D. Busana"], ans: 1 },
            { q: "Penari mampu menyesuaikan gerakan dengan irama musik dengan tepat. Kemampuan ini disebut...", img: null, opt: ["A. Wiraga", "B. Wirama", "C. Wirasa", "D. Wirupa"], ans: 1 },
            { q: "Seorang penari menunjukkan ekspresi sedih saat menari. Hal ini termasuk unsur...", img: null, opt: ["A. Wiraga", "B. Wirama", "C. Wirasa", "D. Properti"], ans: 2 },
            { q: "Jika seorang penari menggunakan kipas saat menari, kipas tersebut disebut...", img: null, opt: ["A. Tata rias", "B. Tata busana", "C. Properti tari", "D. Iringan"], ans: 2 },
            { q: "Tari yang digunakan dalam upacara adat biasanya bersifat...", img: null, opt: ["A. Hiburan", "B. Modern", "C. Sakral", "D. Bebas"], ans: 2 },
            { q: "Tari yang ditampilkan untuk menghibur penonton disebut...", img: null, opt: ["A. Tari upacara", "B. Tari hiburan", "C. Tari sakral", "D. Tari klasik"], ans: 1 },
            { q: "Sebuah tarian dibawakan oleh 5 orang penari. Jenis tari tersebut adalah...", img: null, opt: ["A. Tari tunggal", "B. Tari berpasangan", "C. Tari kelompok", "D. Tari modern"], ans: 2 },
            { q: "Perhatikan ilustrasi: Dua penari bersama 👩‍❤️‍👨\n\nJenis tarinya adalah...", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331287/FOTO_SOAL_NOMER_12_jn67is.png", opt: ["A. Tunggal", "B. Kelompok", "C. Berpasangan", "D. Modern"], ans: 2 },
            { q: "Tari yang diwariskan secara turun-temurun disebut...", img: null, opt: ["A. Tari modern", "B. Tari tradisional", "C. Tari kreasi", "D. Tari bebas"], ans: 1 },
            { q: "Tari yang merupakan pengembangan dari tari tradisional disebut...", img: null, opt: ["A. Tari klasik", "B. Tari modern", "C. Tari kreasi baru", "D. Tari rakyat"], ans: 2 },
            { q: "Seorang penari menari tanpa mengikuti aturan baku dan bebas berekspresi.\n\nJenis tari tersebut adalah...", img: null, opt: ["A. Tradisional", "B. Kreasi baru", "C. Modern/kontemporer", "D. Upacara"], ans: 2 },
            { q: "Mengapa unsur wiraga penting dalam tari?", img: null, opt: ["A. Agar musik jelas", "B. Agar gerak indah & benar", "C. Agar penonton ramai", "D. Agar kostum menarik"], ans: 1 },
            { q: "Fungsi tata rias tebal agar karakter terlihat jelas di panggung adalah...", img: null, opt: ["A. Memperindah", "B. Memperjelas karakter", "C. Menentukan tempo", "D. Mengatur ruang"], ans: 1 },
            { q: "Jika gerakan dilakukan dengan kuat dan tegas, maka unsur yang dominan adalah...", img: null, opt: ["A. Ruang", "B. Waktu", "C. Tenaga", "D. Rasa"], ans: 2 },
            { q: "Penari bergerak di tempat tanpa berpindah (diam di satu titik).\n\nJenis ruang yang digunakan adalah...", img: "https://res.cloudinary.com/dr3evkwcu/image/upload/v1775331286/FOTO_SOAL_NOMER_19_eepg5t.png", opt: ["A. Ruang panggung", "B. Ruang umum", "C. Ruang pribadi", "D. Ruang bebas"], ans: 2 },
            { q: "Mengapa iringan musik penting dalam tari?", img: null, opt: ["A. Agar tak lupa", "B. Agar ramai", "C. Mengatur tempo & suasana", "D. Mengganti kostum"], ans: 2 }
        ];

        let currentIdx = 0;
        let pName = "";
        let userAns = new Array(questions.length).fill(null);
        let timer = 20 * 60;
        let clock;

        function requestStart() {
            pName = document.getElementById('player-name').value.trim();
            if(!pName) return alert("Isi nama dulu!");
            document.getElementById('start-ui').style.display = 'none';
            document.getElementById('warning-ui').style.display = 'flex';
        }

        function confirmStart() {
            document.getElementById('warning-ui').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            document.getElementById('user-display').innerText = "USER: " + pName.toUpperCase();
            startTimer();
            renderAll();
        }

        function startTimer() {
            clock = setInterval(() => {
                timer--;
                let m = Math.floor(timer / 60);
                let s = timer % 60;
                document.getElementById('timer-val').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(timer <= 60) document.getElementById('timer-val').style.color = '#ff3333';
                if(timer <= 0) finish();
            }, 1000);
        }

        function renderAll() {
            renderNumbers();
            showQ();
        }

        function renderNumbers() {
            const grid = document.getElementById('num-grid');
            grid.innerHTML = '';
            questions.forEach((_, i) => {
                const div = document.createElement('div');
                div.className = `num-tile ${i === currentIdx ? 'active' : ''} ${userAns[i] !== null ? 'done' : ''}`;
                div.innerText = i + 1;
                div.onclick = () => { currentIdx = i; renderAll(); };
                grid.appendChild(div);
            });
        }

        function showQ() {
            const q = questions[currentIdx];
            document.getElementById('label-no').innerText = `SOAL ${currentIdx + 1} / 20`;
            document.getElementById('q-text').innerText = q.q;

            const vis = document.getElementById('visual-area');
            vis.innerHTML = q.img ? `<img src="${q.img}">` : `<span style="font-size:3rem; opacity:0.2;">🎭</span>`;

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            q.opt.forEach((txt, i) => {
                const b = document.createElement('div');
                b.className = 'opt-btn';
                if(userAns[currentIdx] !== null) {
                    if(i === q.ans) b.classList.add('correct');
                    if(userAns[currentIdx] === i && i !== q.ans) b.classList.add('wrong');
                }
                b.innerText = txt;
                b.onclick = () => select(i);
                box.appendChild(b);
            });
            document.getElementById('btn-back').disabled = currentIdx === 0;
            document.getElementById('btn-next').innerText = currentIdx === 19 ? "SELESAI" : "LANJUT";
        }

        function select(idx) {
            if(userAns[currentIdx] !== null) return;
            userAns[currentIdx] = idx;
            if(idx === questions[currentIdx].ans) {
                if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
                createPita();
            } else {
                if(navigator.vibrate) navigator.vibrate(250);
            }
            renderAll();
        }

        function changeIdx(dir) {
            if(dir === 1 && currentIdx === 19) return finish();
            currentIdx += dir;
            renderAll();
        }

        function createPita() {
            for(let i=0; i<30; i++){
                const p = document.createElement('div');
                p.className = 'pita';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
                p.style.animationDuration = (Math.random()*2+1)+'s';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }
        }

        function finish() {
            clearInterval(clock);
            let score = 0;
            userAns.forEach((a, i) => { if(a === questions[i].ans) score++; });
            const pct = (score / 20) * 100;

            // Save to Leaderboard
            let rank = JSON.parse(localStorage.getItem('rankDance')) || [];
            rank.push({ name: pName, point: score, percent: pct });
            rank.sort((a, b) => b.point - a.point);
            localStorage.setItem('rankDance', JSON.stringify(rank.slice(0, 10)));

            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            document.getElementById('res-point').innerText = score;
            document.getElementById('res-percent').innerText = `(${pct}%)`;
            
            const badge = document.getElementById('res-badge');
            if(score === 20) badge.innerText = "MAESTRO SENI TARI 👑";
            else if(score >= 15) badge.innerText = "PAKAR TARI 🌟";
            else badge.innerText = "PENARI MUDA ✨";

            const body = document.getElementById('rank-body');
            body.innerHTML = rank.slice(0, 10).map((r, i) => `
                <tr><td>${i+1}</td><td>${r.name.toUpperCase()}</td><td>${r.point} (${r.percent}%)</td></tr>
            `).join('');
        }
    </script>
</body>
</html>
